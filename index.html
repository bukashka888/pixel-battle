<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Battle</title>
    <style>
        * {
            user-select: none;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui;
        }
        .canvas-wrapper {
            background: #0a0c12;
            border-radius: 1rem;
            padding: 6px;
            overflow: auto;
            max-height: 85vh;
            max-width: 95vw;
            cursor: grab;
        }
        .canvas-wrapper.dragging { cursor: grabbing; }
        canvas {
            display: block;
            cursor: crosshair;
            background: #1e1e2a;
        }
        .top-bar {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.8);
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            z-index: 100;
        }
        .color-palette {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            padding: 10px 18px;
            background: rgba(0,0,0,0.85);
            border-radius: 50px;
            z-index: 100;
        }
        .color-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.1s;
        }
        .color-btn.active {
            transform: scale(1.15);
            border-color: white;
            box-shadow: 0 0 8px white;
        }
        .admin-panel {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.9);
            padding: 12px;
            border-radius: 16px;
            z-index: 200;
            color: white;
            border: 1px solid #ffaa66;
            font-size: 12px;
            display: none;
            gap: 8px;
            flex-direction: column;
            min-width: 180px;
        }
        .admin-panel.show { display: flex; }
        .admin-panel button {
            background: #2c3e50;
            border: none;
            padding: 6px 10px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }
        .admin-panel button:hover { background: #e67e22; }
        .admin-panel input {
            background: #2c3e50;
            border: none;
            padding: 6px;
            border-radius: 20px;
            color: white;
        }
        .admin-badge {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: #ffaa66;
            color: black;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            display: none;
            z-index: 200;
        }
        .admin-badge.show { display: block; }
        @media (max-width: 700px) {
            .color-btn { width: 36px; height: 36px; }
        }
    </style>
</head>
<body>
<div class="canvas-wrapper" id="canvasWrapper">
    <canvas id="pixelCanvas"></canvas>
</div>
<div class="top-bar">👥 <span id="onlineCount">0</span></div>
<div class="color-palette" id="palette"></div>
<div class="admin-panel" id="adminPanel">
    <b>👑 АДМИН</b>
    <button id="clearBtn">🗑️ ОЧИСТИТЬ ВСЁ</button>
    <input type="text" id="textInput" placeholder="Текст">
    <button id="drawTextBtn">📝 НАПИСАТЬ</button>
    <select id="adminColor">
        <option value="#e63946">🔴 Красный</option>
        <option value="#f4a261">🟠 Оранжевый</option>
        <option value="#2a9d8f">🟢 Бирюзовый</option>
        <option value="#457b9d">🔵 Синий</option>
        <option value="#ffffff">⚪ Белый</option>
    </select>
    <button id="fillAllBtn">🎨 ЗАЛИТЬ ВСЁ</button>
</div>
<div class="admin-badge" id="adminBadge">👑 АДМИН</div>

<script>
    // ========== НАСТРОЙКИ ==========
    const SIZE = 100;
    const CELL = 10;
    const COOLDOWN = 5000;
    const DEFAULT = "#1e1e2a";
    
    const COLORS = ["#2c2e3a","#e63946","#f4a261","#2a9d8f","#457b9d","#e9c46a","#9c89b8","#f25e5e","#70d6ff","#b7ef9c","#ffffff"];
    
    // DOM
    const canvas = document.getElementById('pixelCanvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('canvasWrapper');
    const onlineSpan = document.getElementById('onlineCount');
    const paletteDiv = document.getElementById('palette');
    
    canvas.width = SIZE * CELL;
    canvas.height = SIZE * CELL;
    
    // ========== ДАННЫЕ ==========
    let pixels = [];
    let currentColor = COLORS[1];
    let lastPixelTime = 0;
    let onCooldown = false;
    let zoom = 0.8;
    let dragging = false;
    let dragStart = { x: 0, y: 0 };
    let scrollStart = { left: 0, top: 0 };
    
    // Админ
    let isAdmin = window.location.href.includes('admin=123456');
    if (isAdmin) {
        document.getElementById('adminPanel').classList.add('show');
        document.getElementById('adminBadge').classList.add('show');
    }
    
    // ID устройства
    let deviceId = localStorage.getItem('deviceId');
    if (!deviceId) {
        deviceId = Math.random().toString(36);
        localStorage.setItem('deviceId', deviceId);
    }
    
    // ========== СОХРАНЕНИЕ ==========
    function saveCanvas() {
        localStorage.setItem('pixelBattle', JSON.stringify(pixels));
    }
    
    function loadCanvas() {
        let saved = localStorage.getItem('pixelBattle');
        if (saved) {
            pixels = JSON.parse(saved);
        } else {
            pixels = Array(SIZE).fill().map(() => Array(SIZE).fill(DEFAULT));
            saveCanvas();
        }
        drawFull();
    }
    
    // ========== ОТРИСОВКА ==========
    function drawFull() {
        for (let y = 0; y < SIZE; y++) {
            for (let x = 0; x < SIZE; x++) {
                ctx.fillStyle = pixels[y][x];
                ctx.fillRect(x * CELL, y * CELL, CELL-0.5, CELL-0.5);
            }
        }
        // сетка
        ctx.beginPath();
        ctx.strokeStyle = "rgba(0,0,0,0.2)";
        for (let i = 0; i <= SIZE; i += 10) {
            ctx.moveTo(i * CELL, 0);
            ctx.lineTo(i * CELL, canvas.height);
            ctx.stroke();
            ctx.moveTo(0, i * CELL);
            ctx.lineTo(canvas.width, i * CELL);
            ctx.stroke();
        }
    }
    
    function drawPixel(x, y, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x * CELL, y * CELL, CELL-0.5, CELL-0.5);
        ctx.beginPath();
        ctx.strokeStyle = "rgba(0,0,0,0.2)";
        ctx.strokeRect(x * CELL, y * CELL, CELL, CELL);
    }
    
    // ========== УСТАНОВКА ПИКСЕЛЯ ==========
    function setPixel(x, y, color, sync = true) {
        if (x < 0 || x >= SIZE || y < 0 || y >= SIZE) return false;
        if (pixels[y][x] === color) return false;
        pixels[y][x] = color;
        drawPixel(x, y, color);
        if (sync) saveCanvas();
        return true;
    }
    
    function placePixel(x, y, color) {
        let now = Date.now();
        if (now - lastPixelTime < COOLDOWN) return false;
        if (setPixel(x, y, color, true)) {
            lastPixelTime = now;
            onCooldown = true;
            document.body.style.cursor = 'wait';
            canvas.style.cursor = 'wait';
            setTimeout(() => {
                onCooldown = false;
                document.body.style.cursor = 'crosshair';
                canvas.style.cursor = 'crosshair';
            }, COOLDOWN);
            return true;
        }
        return false;
    }
    
    // ========== ОНЛАЙН (реальный, без дублей) ==========
    function updateOnline() {
        let now = Date.now();
        let users = JSON.parse(localStorage.getItem('pixelUsers') || '{}');
        users[deviceId] = now;
        let active = 0;
        let newUsers = {};
        for (let id in users) {
            if (now - users[id] < 10000) {
                newUsers[id] = users[id];
                active++;
            }
        }
        localStorage.setItem('pixelUsers', JSON.stringify(newUsers));
        onlineSpan.textContent = active;
    }
    setInterval(updateOnline, 3000);
    updateOnline();
    
    window.addEventListener('beforeunload', () => {
        let users = JSON.parse(localStorage.getItem('pixelUsers') || '{}');
        delete users[deviceId];
        localStorage.setItem('pixelUsers', JSON.stringify(users));
    });
    
    // ========== СИНХРОНИЗАЦИЯ МЕЖДУ ВКЛАДКАМИ ==========
    window.addEventListener('storage', (e) => {
        if (e.key === 'pixelBattle') {
            let newPixels = JSON.parse(e.newValue);
            if (newPixels) {
                for (let y = 0; y < SIZE; y++) {
                    for (let x = 0; x < SIZE; x++) {
                        if (newPixels[y] && newPixels[y][x] !== pixels[y][x]) {
                            pixels[y][x] = newPixels[y][x];
                            drawPixel(x, y, newPixels[y][x]);
                        }
                    }
                }
            }
        }
    });
    
    // ========== АДМИН ФУНКЦИИ ==========
    function clearCanvas() {
        if (!isAdmin) return;
        if (confirm('Очистить весь холст?')) {
            for (let y = 0; y < SIZE; y++) {
                for (let x = 0; x < SIZE; x++) {
                    pixels[y][x] = DEFAULT;
                }
            }
            drawFull();
            saveCanvas();
        }
    }
    
    function fillAll(color) {
        if (!isAdmin) return;
        for (let y = 0; y < SIZE; y++) {
            for (let x = 0; x < SIZE; x++) {
                pixels[y][x] = color;
            }
        }
        drawFull();
        saveCanvas();
    }
    
    function drawText(text, color) {
        if (!isAdmin || !text) return;
        let x = 5, y = 15;
        for (let ch of text.toUpperCase()) {
            if (x > SIZE - 10) { x = 5; y += 8; }
            if (y > SIZE - 10) break;
            // простая пиксельная буква
            for (let py = 0; py < 5; py++) {
                for (let px = 0; px < 5; px++) {
                    if (y+py < SIZE && x+px < SIZE && (px===2 || py===2)) {
                        pixels[y+py][x+px] = color;
                    }
                }
            }
            x += 6;
        }
        drawFull();
        saveCanvas();
    }
    
    // ========== УПРАВЛЕНИЕ ==========
    function getCoord(e) {
        let rect = canvas.getBoundingClientRect();
        let scaleX = canvas.width / rect.width;
        let scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        let canvasX = (clientX - rect.left) * scaleX;
        let canvasY = (clientY - rect.top) * scaleY;
        if (canvasX < 0 || canvasY < 0) return null;
        let x = Math.floor(canvasX / CELL);
        let y = Math.floor(canvasY / CELL);
        if (x >= 0 && x < SIZE && y >= 0 && y < SIZE) return {x, y};
        return null;
    }
    
    function onClick(e) {
        if (e.button !== 0) return;
        e.preventDefault();
        let coord = getCoord(e);
        if (coord) placePixel(coord.x, coord.y, currentColor);
    }
    
    let painting = false;
    function onStart(e) {
        if (e.button === 0 || e.type === 'touchstart') {
            e.preventDefault();
            painting = true;
            onClick(e);
        }
    }
    function onMove(e) {
        if (!painting) return;
        e.preventDefault();
        let coord = getCoord(e);
        if (coord) placePixel(coord.x, coord.y, currentColor);
    }
    function onEnd() { painting = false; }
    
    // Перемещение правой кнопкой
    function onRightStart(e) {
        if (e.button === 2) {
            e.preventDefault();
            dragging = true;
            dragStart.x = e.clientX;
            dragStart.y = e.clientY;
            scrollStart.left = wrapper.scrollLeft;
            scrollStart.top = wrapper.scrollTop;
            wrapper.classList.add('dragging');
        }
    }
    function onRightMove(e) {
        if (!dragging) return;
        e.preventDefault();
        let dx = e.clientX - dragStart.x;
        let dy = e.clientY - dragStart.y;
        wrapper.scrollLeft = scrollStart.left - dx;
        wrapper.scrollTop = scrollStart.top - dy;
    }
    function onRightEnd() {
        dragging = false;
        wrapper.classList.remove('dragging');
    }
    
    // Зум
    function onWheel(e) {
        e.preventDefault();
        let delta = e.deltaY > 0 ? -0.1 : 0.1;
        let newZoom = zoom + delta;
        if (newZoom >= 0.3 && newZoom <= 2.5) {
            zoom = newZoom;
            canvas.style.transform = `scale(${zoom})`;
        }
    }
    
    // Палитра
    function buildPalette() {
        paletteDiv.innerHTML = '';
        COLORS.forEach(c => {
            let btn = document.createElement('div');
            btn.className = 'color-btn';
            btn.style.backgroundColor = c;
            if (c === currentColor) btn.classList.add('active');
            btn.onclick = () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentColor = c;
            };
            paletteDiv.appendChild(btn);
        });
    }
    
    // ========== ЗАПУСК ==========
    canvas.style.transform = `scale(${zoom})`;
    canvas.style.transformOrigin = '0 0';
    
    canvas.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    canvas.addEventListener('touchstart', onStart, {passive: false});
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('touchend', onEnd);
    
    canvas.addEventListener('mousedown', onRightStart);
    window.addEventListener('mousemove', onRightMove);
    window.addEventListener('mouseup', onRightEnd);
    canvas.addEventListener('wheel', onWheel, {passive: false});
    canvas.addEventListener('contextmenu', e => e.preventDefault());
    
    // Админ кнопки
    if (isAdmin) {
        document.getElementById('clearBtn').onclick = clearCanvas;
        document.getElementById('fillAllBtn').onclick = () => fillAll(document.getElementById('adminColor').value);
        document.getElementById('drawTextBtn').onclick = () => drawText(document.getElementById('textInput').value, document.getElementById('adminColor').value);
    }
    
    buildPalette();
    loadCanvas();
    
    // Центрируем
    setTimeout(() => {
        wrapper.scrollLeft = (wrapper.scrollWidth - wrapper.clientWidth) / 2;
        wrapper.scrollTop = (wrapper.scrollHeight - wrapper.clientHeight) / 2;
    }, 100);
</script>
</body>
</html>
