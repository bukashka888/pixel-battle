<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Battle - Общий холст</title>
    <style>
        * {
            user-select: none;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #1a1e2c 0%, #0f1219 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-container {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 1.5rem;
            padding: 1rem;
        }
        .canvas-wrapper {
            background: #0a0c12;
            border-radius: 1rem;
            padding: 6px;
            overflow: auto;
            max-height: 80vh;
            max-width: 95vw;
            cursor: grab;
        }
        .canvas-wrapper.dragging { cursor: grabbing; }
        canvas {
            display: block;
            cursor: crosshair;
            background-color: #1e1e2a;
            transform-origin: 0 0;
        }
        .info-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            font-size: 14px;
        }
        .info-bar span { color: #4caf50; font-size: 18px; }
        .color-palette {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 60px;
            z-index: 1000;
        }
        .color-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }
        .color-btn.active {
            transform: scale(1.15);
            border-color: white;
        }
        .status {
            position: fixed;
            bottom: 100px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #aaa;
            z-index: 1000;
        }
        .status.connected { color: #4caf50; }
        .cooldown-timer {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #ffaa66;
            font-family: monospace;
            z-index: 1000;
        }
        @media (max-width: 700px) {
            .color-btn { width: 38px; height: 38px; }
            .color-palette { gap: 8px; padding: 10px 16px; }
            .info-bar { font-size: 12px; top: 10px; right: 10px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="pixelCanvas" width="2500" height="2500"></canvas>
    </div>
</div>
<div class="info-bar">👥 Онлайн: <span id="onlineCount">0</span></div>
<div class="status" id="status">🔄 Загрузка холста...</div>
<div class="cooldown-timer" id="cooldownTimer">⚡ Готов</div>
<div class="color-palette" id="palette"></div>

<script>
    // ============== КОНФИГ ==============
    const SIZE = 150;
    const CELL_SIZE = 10;
    const CANVAS_SIZE = SIZE * CELL_SIZE;
    const COOLDOWN_MS = 5000;
    const DEFAULT_COLOR = "#2d2f36";
    
    const PALETTE = ["#2c2e3a", "#e63946", "#f4a261", "#2a9d8f", "#457b9d", "#e9c46a", "#9c89b8", "#f25e5e", "#70d6ff", "#b7ef9c", "#ffb3ba", "#ffffff"];
    
    // DOM элементы
    const canvas = document.getElementById('pixelCanvas');
    const ctx = canvas.getContext('2d');
    const canvasWrapper = document.getElementById('canvasWrapper');
    const paletteContainer = document.getElementById('palette');
    const onlineCountSpan = document.getElementById('onlineCount');
    const statusDiv = document.getElementById('status');
    const cooldownTimerDiv = document.getElementById('cooldownTimer');
    
    // Состояние
    let pixels = [];
    let currentColor = PALETTE[1];
    let lastPixelTime = 0;
    let isOnCooldown = false;
    let currentZoom = 0.7;
    let isDragging = false;
    let dragStartX, dragStartY, scrollStartLeft, scrollStartTop;
    let cooldownInterval = null;
    
    // Уникальный ID для этого устройства/браузера (сохраняется между перезаходами)
    let deviceId = localStorage.getItem('pixelBattleDeviceId');
    if (!deviceId) {
        deviceId = Math.random().toString(36).substring(2) + Date.now().toString(36);
        localStorage.setItem('pixelBattleDeviceId', deviceId);
    }
    
    canvas.width = CANVAS_SIZE;
    canvas.height = CANVAS_SIZE;
    canvas.style.transform = `scale(${currentZoom})`;
    
    // ============== СОХРАНЕНИЕ В LOCALSTORAGE ==============
    function saveCanvas() {
        localStorage.setItem('pixelBattleCanvas', JSON.stringify(pixels));
    }
    
    function loadCanvas() {
        const saved = localStorage.getItem('pixelBattleCanvas');
        if (saved) {
            pixels = JSON.parse(saved);
            statusDiv.innerHTML = '✅ Холст загружен';
            statusDiv.classList.add('connected');
        } else {
            pixels = Array(SIZE).fill().map(() => Array(SIZE).fill(DEFAULT_COLOR));
            saveCanvas();
            statusDiv.innerHTML = '🆕 Новый холст создан';
        }
        drawCanvas();
    }
    
    // ============== ОТРИСОВКА ==============
    function drawCanvas() {
        if (!pixels.length) return;
        for(let row = 0; row < SIZE; row++) {
            for(let col = 0; col < SIZE; col++) {
                ctx.fillStyle = pixels[row]?.[col] || DEFAULT_COLOR;
                ctx.fillRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE - 0.5, CELL_SIZE - 0.5);
            }
        }
        ctx.beginPath();
        ctx.strokeStyle = "rgba(0,0,0,0.2)";
        ctx.lineWidth = 0.5;
        for(let i = 0; i <= SIZE; i += 10) {
            ctx.beginPath();
            ctx.moveTo(i * CELL_SIZE, 0);
            ctx.lineTo(i * CELL_SIZE, CANVAS_SIZE);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * CELL_SIZE);
            ctx.lineTo(CANVAS_SIZE, i * CELL_SIZE);
            ctx.stroke();
        }
    }
    
    function drawPixel(row, col, color) {
        ctx.fillStyle = color;
        ctx.fillRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE - 0.5, CELL_SIZE - 0.5);
        ctx.beginPath();
        ctx.strokeStyle = "rgba(0,0,0,0.2)";
        ctx.strokeRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE, CELL_SIZE);
    }
    
    // ============== УСТАНОВКА ПИКСЕЛЯ ==============
    function canPlacePixel() {
        return (Date.now() - lastPixelTime) >= COOLDOWN_MS;
    }
    
    function updateCooldownDisplay() {
        if (!isOnCooldown) {
            cooldownTimerDiv.innerHTML = '⚡ Готов';
            cooldownTimerDiv.style.color = '#4caf50';
            return;
        }
        const timeLeft = Math.ceil((COOLDOWN_MS - (Date.now() - lastPixelTime)) / 1000);
        if (timeLeft <= 0) {
            isOnCooldown = false;
            cooldownTimerDiv.innerHTML = '⚡ Готов';
            cooldownTimerDiv.style.color = '#4caf50';
        } else {
            cooldownTimerDiv.innerHTML = `⏱️ ${timeLeft} сек`;
            cooldownTimerDiv.style.color = '#ffaa66';
        }
    }
    
    function startCooldown() {
        isOnCooldown = true;
        document.body.style.cursor = 'wait';
        canvas.style.cursor = 'wait';
        
        if (cooldownInterval) clearInterval(cooldownInterval);
        cooldownInterval = setInterval(() => {
            updateCooldownDisplay();
            if (!isOnCooldown && cooldownInterval) {
                clearInterval(cooldownInterval);
                cooldownInterval = null;
            }
        }, 200);
        updateCooldownDisplay();
    }
    
    function setPixel(row, col, color) {
        if (row < 0 || row >= SIZE || col < 0 || col >= SIZE) return false;
        if (pixels[row][col] === color) return false;
        
        pixels[row][col] = color;
        drawPixel(row, col, color);
        saveCanvas();
        return true;
    }
    
    function placePixel(row, col, color) {
        if (isOnCooldown) return false;
        if (setPixel(row, col, color)) {
            lastPixelTime = Date.now();
            startCooldown();
            if(navigator.vibrate) navigator.vibrate(30);
            return true;
        }
        return false;
    }
    
    // ============== ОНЛАЙН СЧЕТЧИК (ПО РЕАЛЬНЫМ УСТРОЙСТВАМ) ==============
    function initOnlineCounter() {
        // Храним активные устройства с их последним временем жизни
        let heartbeatInterval;
        
        function updateOnlineCount() {
            const now = Date.now();
            let devices = JSON.parse(localStorage.getItem('pixelBattleDevices') || '{}');
            
            // Обновляем текущее устройство
            devices[deviceId] = now;
            
            // Удаляем устройства, которые не отвечали больше 15 секунд
            const activeDevices = {};
            let count = 0;
            for (const [id, lastSeen] of Object.entries(devices)) {
                if (now - lastSeen < 15000) {
                    activeDevices[id] = lastSeen;
                    count++;
                }
            }
            
            // Сохраняем обратно
            localStorage.setItem('pixelBattleDevices', JSON.stringify(activeDevices));
            onlineCountSpan.textContent = count;
        }
        
        // Отправляем сигнал "я жив" каждые 5 секунд
        updateOnlineCount();
        heartbeatInterval = setInterval(updateOnlineCount, 5000);
        
        // При закрытии вкладки удаляем себя
        window.addEventListener('beforeunload', () => {
            clearInterval(heartbeatInterval);
            let devices = JSON.parse(localStorage.getItem('pixelBattleDevices') || '{}');
            delete devices[deviceId];
            localStorage.setItem('pixelBattleDevices', JSON.stringify(devices));
        });
        
        // Также удаляем себя при перезагрузке (перед закрытием)
        window.addEventListener('pagehide', () => {
            let devices = JSON.parse(localStorage.getItem('pixelBattleDevices') || '{}');
            delete devices[deviceId];
            localStorage.setItem('pixelBattleDevices', JSON.stringify(devices));
        });
    }
    
    // ============== СИНХРОНИЗАЦИЯ МЕЖДУ ВКЛАДКАМИ ==============
    function initCrossTabSync() {
        window.addEventListener('storage', (e) => {
            if (e.key === 'pixelBattleCanvas') {
                const newPixels = JSON.parse(e.newValue);
                if (newPixels) {
                    for (let row = 0; row < SIZE; row++) {
                        for (let col = 0; col < SIZE; col++) {
                            if (newPixels[row] && newPixels[row][col] !== pixels[row]?.[col]) {
                                if (pixels[row]) {
                                    pixels[row][col] = newPixels[row][col];
                                    drawPixel(row, col, newPixels[row][col]);
                                }
                            }
                        }
                    }
                    statusDiv.innerHTML = '🔄 Обновлено';
                    setTimeout(() => {
                        if (statusDiv.innerHTML === '🔄 Обновлено') {
                            statusDiv.innerHTML = '✅ Холст загружен';
                        }
                    }, 1500);
                }
            }
        });
    }
    
    // ============== УПРАВЛЕНИЕ ==============
    function getPixelCoordFromEvent(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let canvasX = (clientX - rect.left) * scaleX;
        let canvasY = (clientY - rect.top) * scaleY;
        if(canvasX < 0 || canvasY < 0 || canvasX > canvas.width || canvasY > canvas.height) return null;
        const col = Math.floor(canvasX / CELL_SIZE);
        const row = Math.floor(canvasY / CELL_SIZE);
        if(row >= 0 && row < SIZE && col >= 0 && col < SIZE) return { row, col };
        return null;
    }
    
    function handleCanvasClick(e) {
        if (isOnCooldown) return;
        if (e.button !== 0) return;
        e.preventDefault();
        let clientX = e.clientX, clientY = e.clientY;
        if(e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        }
        const coord = getPixelCoordFromEvent(clientX, clientY);
        if(coord) {
            placePixel(coord.row, coord.col, currentColor);
        }
    }
    
    let isPainting = false;
    function onPointerStart(e) {
        if (isOnCooldown) return;
        if (e.button === 0 || e.type === 'touchstart') {
            e.preventDefault();
            isPainting = true;
            handleCanvasClick(e);
        }
    }
    
    function onPointerMove(e) {
        if(!isPainting || isOnCooldown) return;
        e.preventDefault();
        let clientX = e.clientX, clientY = e.clientY;
        if(e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        }
        const coord = getPixelCoordFromEvent(clientX, clientY);
        if(coord) placePixel(coord.row, coord.col, currentColor);
    }
    
    function onPointerEnd() { isPainting = false; }
    
    function onRightMouseDown(e) {
        if (e.button === 2) {
            e.preventDefault();
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            scrollStartLeft = canvasWrapper.scrollLeft;
            scrollStartTop = canvasWrapper.scrollTop;
            canvasWrapper.classList.add('dragging');
        }
    }
    
    function onRightMouseMove(e) {
        if (!isDragging) return;
        e.preventDefault();
        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;
        let newLeft = scrollStartLeft - dx;
        let newTop = scrollStartTop - dy;
        const maxLeft = canvasWrapper.scrollWidth - canvasWrapper.clientWidth;
        const maxTop = canvasWrapper.scrollHeight - canvasWrapper.clientHeight;
        canvasWrapper.scrollLeft = Math.max(0, Math.min(newLeft, maxLeft));
        canvasWrapper.scrollTop = Math.max(0, Math.min(newTop, maxTop));
    }
    
    function onRightMouseUp() {
        isDragging = false;
        canvasWrapper.classList.remove('dragging');
    }
    
    function handleWheel(e) {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        let newZoom = currentZoom + delta;
        newZoom = Math.min(3, Math.max(0.2, newZoom));
        if (newZoom !== currentZoom) {
            currentZoom = newZoom;
            canvas.style.transform = `scale(${currentZoom})`;
        }
    }
    
    // ============== ПАЛИТРА ==============
    function buildPalette() {
        paletteContainer.innerHTML = '';
        PALETTE.forEach((color) => {
            const btn = document.createElement('div');
            btn.className = 'color-btn';
            btn.style.backgroundColor = color;
            if(color === currentColor) btn.classList.add('active');
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
                currentColor = color;
            });
            paletteContainer.appendChild(btn);
        });
    }
    
    // ============== СОБЫТИЯ ==============
    function attachEvents() {
        canvas.addEventListener('mousedown', onPointerStart);
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('mouseup', onPointerEnd);
        canvas.addEventListener('touchstart', onPointerStart, { passive: false });
        window.addEventListener('touchmove', onPointerMove, { passive: false });
        window.addEventListener('touchend', onPointerEnd);
        canvas.addEventListener('mousedown', onRightMouseDown);
        window.addEventListener('mousemove', onRightMouseMove);
        window.addEventListener('mouseup', onRightMouseUp);
        canvas.addEventListener('wheel', handleWheel, { passive: false });
        canvasWrapper.addEventListener('wheel', handleWheel, { passive: false });
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
    }
    
    // ============== ЗАПУСК ==============
    function init() {
        buildPalette();
        attachEvents();
        loadCanvas();
        initOnlineCounter();
        initCrossTabSync();
        canvas.style.cursor = 'crosshair';
        canvasWrapper.style.cursor = 'grab';
        
        setTimeout(() => {
            canvasWrapper.scrollLeft = (canvasWrapper.scrollWidth - canvasWrapper.clientWidth) / 2;
            canvasWrapper.scrollTop = (canvasWrapper.scrollHeight - canvasWrapper.clientHeight) / 2;
        }, 100);
        
        updateCooldownDisplay();
    }
    
    init();
</script>
</body>
</html>
